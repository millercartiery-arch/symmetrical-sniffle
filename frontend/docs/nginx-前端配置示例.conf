# 前端 SPA 示例配置（用于 www.hkd.llc / hkd.llc）
# 用法：在服务器上放到 /etc/nginx/conf.d/ 或 sites-available 后，改 root 路径并 reload nginx

server {
    listen 80;
    server_name www.hkd.llc hkd.llc;
    # 前端构建产物目录（必须包含 index.html 和 assets 文件夹）
    root /var/www/massmail/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 若后端 API 在同一台机，可用下面反向代理（否则前端直接请求 VITE_API_BASE_URL）
    # location /api/ {
    #     proxy_pass http://127.0.0.1:3000/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}

