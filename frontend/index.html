  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body {
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(85, 97, 108, 0.12), transparent 38%),
        linear-gradient(180deg, #f7f8fa 0%, #eef2f6 100%);
      color: #1f2933;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(85, 97, 108, 0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(85, 97, 108, 0.035) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.35), transparent 76%);
      opacity: 0.42;
    }
    #root { width: 100%; min-height: 100vh; }
  </style>
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
